services:
  whoami:
    image: traefik/whoami:latest
    restart: unless-stopped
    user: "${UID}:${GID}"

    networks:
      - traefik

    labels:
      traefik.enable: "true"
      traefik.http.routers.whoami.rule: Host(`whoami.admin.lorenzopieri.dev`)
      traefik.http.routers.whoami.entrypoints: websecure
      traefik.http.routers.whoami.tls: "true"

networks:
  traefik:
    external: true
