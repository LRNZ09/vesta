services:
  jdownloader-2:
    image: jlesage/jdownloader-2:v26.07.2
    restart: unless-stopped

    expose:
      - 3129
      - 5800

    volumes:
      - ./config:/config
      - ./output:/output

    environment:
      # jlesage starts as root, runs its init scripts, then drops the app itself
      # to USER_ID:GROUP_ID (X server, nginx and JDownloader all run as this uid,
      # never root). A compose `user:` can't replace this: 10-init-users.sh must
      # `chown /etc/shadow`, which needs CAP_CHOWN a non-root process can't have.
      USER_ID: ${UID}
      GROUP_ID: ${GID}
      DARK_MODE: 1
      ENABLE_CJK_FONT: 1
      SECURE_CONNECTION: 1
      VNC_LISTENING_PORT: -1
      WEB_AUTHENTICATION: 1
      # WEB_AUTHENTICATION_USERNAME: LRNZ09

    networks:
      - traefik

    labels:
      traefik.enable: "true"
      traefik.http.routers.jdownloader-2.rule: Host(`jdownloader-2.admin.lorenzopieri.dev`)
      traefik.http.routers.jdownloader-2.entrypoints: websecure
      traefik.http.routers.jdownloader-2.tls: "true"
      traefik.http.services.jdownloader-2.loadbalancer.server.scheme: https
      traefik.http.services.jdownloader-2.loadbalancer.server.port: "5800"
      traefik.http.services.jdownloader-2.loadbalancer.serverstransport: insecure-https-transport@file

networks:
  traefik:
    external: true
